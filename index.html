<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cobalt Shield | Secure Systems for Africa & Beyond</title>
  <meta name="description" content="Cybersecurity, ethical technology, and digital infrastructure built for Africa and beyond. Protecting youth and organizations through practical, privacy-first solutions." />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="author" content="Delphin Hakizimana" />
  <meta name="keywords" content="Cobalt Shield, digital safety Africa, cybersecurity, ethical technology, youth protection, sustainable innovation" />

  <meta property="og:title" content="Cobalt Shield Initiative" />
  <meta property="og:description" content="Secure systems and digital infrastructure for Africa and beyond." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cobalt-shield.com/" />
  <meta property="og:image" content="/cobalt-logo.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cobalt Shield Initiative" />
  <meta name="twitter:description" content="Secure systems and digital infrastructure for Africa and beyond." />

  <link rel="canonical" href="https://cobalt-shield.com/" />
  <link rel="icon" type="image/png" href="/cobalt-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0a0f1e;
      --ink-2: #111827;
      --ink-3: #1e293b;
      --cobalt: #1e56c8;
      --cobalt-light: #3b7cf8;
      --cobalt-glow: rgba(30, 86, 200, 0.18);
      --gold: #f5a623;
      --gold-light: #ffd166;
      --white: #f0f4ff;
      --white-dim: rgba(240, 244, 255, 0.65);
      --white-faint: rgba(240, 244, 255, 0.1);
      --border: rgba(240, 244, 255, 0.08);
      --border-bright: rgba(240, 244, 255, 0.18);
      --ok: #22d3a5;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-lg: 24px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── KEYFRAME ANIMATIONS ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.18;
        transform: scale(1);
      }
      50% {
        opacity: 0.25;
        transform: scale(1.05);
      }
    }

    @keyframes gridPan {
      from { background-position: 0 0; }
      to { background-position: 0 60px; }
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .skip-link {
      position: absolute; top: -40px; left: 0;
      background: var(--cobalt); color: white;
      padding: 8px 16px; z-index: 10000;
      transition: top var(--transition);
    }
    .skip-link:focus { top: 0; }

    .container {
      width: 100%; max-width: 1280px;
      margin: 0 auto; padding: 0 24px;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      padding: 16px 0;
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav__inner {
      display: flex; align-items: center;
      justify-content: space-between; gap: 24px;
    }

    .brand {
      font-family: var(--font-display);
      font-size: 1.4rem; font-weight: 800;
      letter-spacing: -0.03em;
    }
    .brand em { color: var(--gold); font-style: normal; }

    .nav__links {
      display: flex; gap: 4px;
      align-items: center; list-style: none;
    }
    .nav__links a {
      color: var(--white-dim); font-size: 0.9rem; font-weight: 500;
      padding: 8px 14px; border-radius: var(--radius-sm);
      transition: all var(--transition);
    }
    .nav__links a:hover { color: var(--white); background: var(--white-faint); }
    .nav__links .cta {
      background: var(--cobalt); color: white; font-weight: 700;
      border-radius: var(--radius-sm); margin-left: 8px;
    }
    .nav__links .cta:hover { background: var(--cobalt-light); transform: translateY(-1px); }

    .nav__burger {
      display: none; background: none; border: none;
      color: var(--white); font-size: 1.5rem; cursor: pointer; padding: 8px;
    }

    @media (max-width: 768px) {
      .nav__links {
        display: none; position: absolute; top: 100%; left: 0; right: 0;
        background: var(--ink-2); flex-direction: column; padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .nav__links.open { display: flex; }
      .nav__burger { display: block; }
    }

    /* ── HERO ── */
    .hero {
      min-height: 92vh; display: flex; align-items: center;
      position: relative; overflow: hidden; padding: 80px 0;
    }

    .hero__bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(30, 86, 200, 0.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 10% 80%, rgba(245, 166, 35, 0.07) 0%, transparent 60%),
        var(--ink);
      animation: glowPulse 8s ease-in-out infinite;
    }

    .hero__grid-lines {
      position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(240,244,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,244,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
      animation: gridPan 20s linear infinite;
    }

    .hero__content {
      position: relative; z-index: 1;
      max-width: 820px;
    }

    .hero__tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gold);
      background: rgba(245, 166, 35, 0.1);
      border: 1px solid rgba(245, 166, 35, 0.25);
      padding: 6px 14px; border-radius: 999px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease both;
    }

    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 800;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .hero h1 .accent {
      background: linear-gradient(135deg, var(--cobalt-light), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
    }

    .hero__sub {
      font-size: 1.15rem; color: var(--white-dim);
      max-width: 600px; margin-bottom: 40px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .hero__cta {
      display: flex; gap: 14px; flex-wrap: wrap;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .hero__stats {
      display: flex; gap: 40px; margin-top: 72px; flex-wrap: wrap;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    .hero__stat-value {
      font-family: var(--font-display);
      font-size: 2.2rem; font-weight: 800; color: var(--white);
      letter-spacing: -0.03em;
    }
    .hero__stat-value span { color: var(--gold); }
    .hero__stat-label { font-size: 0.85rem; color: var(--white-dim); margin-top: 2px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.95rem; cursor: pointer;
      transition: all var(--transition);
    }
  </style>
</head>
