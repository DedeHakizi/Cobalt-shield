<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cobalt Shield | Secure Systems for Africa & Beyond</title>
  <meta name="description" content="Cybersecurity, ethical technology, and digital infrastructure built for Africa and beyond." />
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="icon" type="image/png" href="/cobalt-logo.png" />
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0a0f1e;
      --cobalt: #1e56c8;
      --cobalt-light: #3b7cf8;
      --gold: #f5a623;
      --gold-light: #ffd166;
      --white: #f0f4ff;
      --white-dim: rgba(240, 244, 255, 0.65);
      --border: rgba(240, 244, 255, 0.08);
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--white);
      font-family: var(--font-body);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://w3.org id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.18; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.05); }
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 40px 24px; text-align: center;
    }
    .hero__bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(30, 86, 200, 0.25) 0%, transparent 70%), var(--ink);
      animation: glowPulse 8s ease-in-out infinite;
    }
    .hero__content { position: relative; z-index: 1; max-width: 800px; }
    
    .hero__tag {
      display: inline-block; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gold); background: rgba(245, 166, 35, 0.1);
      border: 1px solid rgba(245, 166, 35, 0.2); padding: 6px 16px; border-radius: 99px;
      margin-bottom: 24px; animation: fadeUp 0.6s ease both;
    }
    .hero h1 {
      font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 800; line-height: 1.1; margin-bottom: 20px; letter-spacing: -0.02em;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--cobalt-light), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero__sub {
      font-size: 1.1rem; color: var(--white-dim); max-width: 600px; margin: 0 auto 32px;
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .btn {
      display: inline-block; padding: 14px 28px; background: var(--cobalt);
      color: white; font-family: var(--font-display); font-weight: 700;
      border-radius: 8px; border: none; cursor: pointer; transition: all var(--transition);
      animation: fadeUp 0.6s ease 0.3s both;
    }
    .btn:hover { background: var(--cobalt-light); transform: translateY(-2px); }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__content">
      <div class="hero__tag">🔐 Cybersecurity · 🌍 Africa · ⚡ Ethical Tech</div>
      <h1>Secure Infrastructure Built for the <span>Real World</span></h1>
      <p class="hero__sub">Digital safety tools, automation systems, and cybersecurity platforms built lean, deployed fast, and designed to protect what matters most.</p>
      <a href="https://github.com" class="btn">Explore the Architecture →</a>
    </div>
  </section>

</body>
</html>
