  <style>
    :root {
      /* Brand Colors */
      --brand: #0f4c81;
      --brand-dark: #0b3960;
      --brand-light: #1e6ba8;
      
      /* Semantic Colors */
      --bg: #f8fafc;
      --bg-secondary: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --text-secondary: #334155;
      --muted: #64748b;
      --border: #e2e8f0;
      
      /* Status Colors */
      --ok: #10b981;
      --ok-bg: #ecfdf5;
      --warn: #f59e0b;
      --warn-bg: #fffbeb;
      --bad: #ef4444;
      --bad-bg: #fef2f2;
      
      /* UI Properties */
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.08);
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 20px 40px rgba(15, 23, 42, 0.12);
      --radius: 16px;
      --radius-sm: 8px;
      --radius-lg: 24px;
      
      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      
      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      
      /* Typography */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    /* Base Reset & Modern Defaults */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Skip Link for Accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--brand);
      color: white;
      padding: var(--space-sm) var(--space-md);
      z-index: 1000;
      transition: top var(--transition-fast);
    }

    .skip-link:focus {
      top: 0;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 var(--space-md);
    }

    /* Navigation */
    .nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: var(--space-md) 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--brand);
      text-decoration: none;
    }

    .brand span {
      color: var(--text);
    }

    .nav__links {
      display: flex;
      gap: var(--space-lg);
      align-items: center;
    }

    .nav__links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-fast);
    }

    .nav__links a:hover,
    .nav__links a[aria-current="page"] {
      color: var(--brand);
    }

    .nav__links .pill {
      background: var(--brand);
      color: white !important;
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-lg);
    }

    .nav__burger {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: var(--space-sm);
    }

    @media (max-width: 768px) {
      .nav__links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--card);
        flex-direction: column;
        padding: var(--space-md);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .nav__links.open {
        display: flex;
      }

      .nav__burger {
        display: block;
      }
    }

    /* Hero Section */
    .hero {
      padding: var(--space-xl) 0 var(--space-lg);
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: white;
    }

    .hero__content {
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      margin-bottom: var(--space-sm);
      line-height: 1.2;
    }

    .hero p.muted {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.1rem;
      max-width: 760px;
      margin: var(--space-sm) auto;
    }

    .hero__cta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      justify-content: center;
      margin-top: var(--space-lg);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all var(--transition-fast);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .btn--primary {
      background: white;
      color: var(--brand);
      border-color: white;
    }

    .btn--primary:hover {
      background: var(--bg);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn--ghost {
      background: transparent;
      color: white;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn--ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .btn--call,
    .btn--whatsapp {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn--whatsapp:hover {
      background: #25D366;
      border-color: #25D366;
    }

    .btn--call:hover {
      background: #0078FF;
      border-color: #0078FF;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition-normal);
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
    }

    /* KPI Grid */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--space-md);
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-fast);
    }

    .kpi:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .kpi .label {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-xs);
      font-weight: 600;
    }

    .kpi .value {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1.1;
      color: var(--text);
    }

    .kpi .delta {
      margin-top: var(--space-sm);
      font-size: 0.85rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .delta.up {
      color: var(--ok);
    }

    .delta.down {
      color: var(--bad);
    }

    .delta.up::before {
      content: "↑";
    }

    .delta.down::before {
      content: "↓";
    }

    /* Grid Layouts */
    .grid-2 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-md);
    }

    @media (max-width: 980px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    /* Charts */
    .candles-wrap,
    .bar-wrap {
      height: 320px;
      position: relative;
    }

    .candles-wrap canvas,
    .bar-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* Tables */
    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th,
    .table td {
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    .table th {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      background: var(--bg-secondary);
    }

    .table tbody tr:hover {
      background: var(--bg-secondary);
    }

    /* Chips/Badges */
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .chip.ok {
      background: var(--ok-bg);
      border-color: var(--ok);
      color: #065f46;
    }

    .chip.warn {
      background: var(--warn-bg);
      border-color: var(--warn);
      color: #92400e;
    }

    .chip.bad {
      background: var(--bad-bg);
      border-color: var(--bad);
      color: #991b1b;
    }

    /* Progress Bar */
    .progress {
      height: 12px;
      background: var(--bg-secondary);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--brand-light));
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    /* Toolbar & Toggles */
    .toolbar {
      display: flex;
      gap: var(--space-md);
      align-items: center;
      justify-content: space-between;
      margin: var(--space-md) 0 var(--space-lg);
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
    }

    .toggle input {
      accent-color: var(--brand);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Loading States */
    .loading {
      opacity: 0.6;
      pointer-events: none;
      position: relative;
    }
